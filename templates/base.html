<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GIAA Terminal Center Logbook{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow-md p-4 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="{{ url_for('static', filename='logo.png') }}" class="w-10 h-10 object-contain" alt="Logo">
                <span class="font-bold text-xl text-gray-800">Terminal Center Log</span>
            </div>

            <div class="flex items-center gap-6">
                <a href="/" class="text-gray-600 hover:text-purple-600 font-bold">Dashboard</a>
                <a href="/master_log" class="text-gray-600 hover:text-purple-600 font-bold">Master Log</a>
                
                {% if session.get('role') == 'Admin' %}
                    <a href="/admin_dashboard" class="text-gray-600 hover:text-purple-600 font-bold">Admin</a>
                {% endif %}

                <div class="relative">
                    <button onclick="toggleDropdown()" class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold hover:bg-purple-600 transition">
                        {{ session.get('first_name', 'U')[0] }}{{ session.get('last_name', 'U')[0] }}
                    </button>

                    <div id="userMenu" class="hidden absolute right-0 mt-2 w-40 bg-white rounded-lg shadow-xl border border-gray-100 py-2 z-50">
                        <a href="/change_password" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Change Password</a>
                        <a href="/logout" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        {% block content %}{% endblock %}
    </div>

    <script>
        function toggleDropdown() {
            document.getElementById('userMenu').classList.toggle('hidden');
        }

        // Close menu if clicking outside
        window.onclick = function(event) {
            if (!event.target.matches('button')) {
                var menu = document.getElementById('userMenu');
                if (!menu.classList.contains('hidden')) {
                    menu.classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
